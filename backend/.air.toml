root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server.exe ./cmd/server"
  bin = "tmp/server.exe"
  include_ext = ["go", "sql", "tmpl", "tpl", "html"]
  exclude_dir = ["tmp", "bin", "migrations"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
