services:
  postgres:
    image: postgres:16-alpine
    container_name: eppat-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-eppat}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - eppat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-eppat}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eppat-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - eppat_redis_data:/data

volumes:
  eppat_pg_data:
  eppat_redis_data:
