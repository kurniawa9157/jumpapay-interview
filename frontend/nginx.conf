server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Log ke stdout/stderr (best practice untuk container).
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Keamanan dasar
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reverse proxy ke backend Go.
    # "backend" adalah nama service di docker-compose.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Uploads (Media Library files) — diserve oleh backend Go via
    # r.Static("/uploads", UPLOAD_DIR). Pakai modifier `^~` supaya
    # prefix match win atas regex asset rule di bawah (kalau tidak,
    # nginx akan eval regex `\.jpg$` lebih dulu untuk /uploads/foo.jpg
    # → try_files lokal → 404).
    location ^~ /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cache image/file statis di browser (filename uuid-prefix sudah unik).
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Healthcheck backend (opsional passthrough).
    location = /health {
        proxy_pass http://backend:8080/health;
    }

    # Asset statis dengan cache panjang (vite sudah kasih hash di nama file).
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback: semua URL yang bukan file jatuh ke index.html.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html tidak boleh di-cache lama — jaminan user dapat bundle terbaru.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
